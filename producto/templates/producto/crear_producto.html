{% extends "base.html" %}

{% block texto_pestania %}Crear producto{% endblock texto_pestania %}

{% block header_h1 %}Crear Producto{% endblock header_h1 %}

{% block contenido %}
<form action="{% url 'producto:crear_producto' %}" method="post">
        {% csrf_token %}

        {% comment %} <label for="nombre">Nombre: </label>
        <input type="text" name="nombre">
        <label for="descripcion">Descripcion:</label>
        <input type="text" name="descripcion"> {% endcomment %}

        {{formulario}}

        <input type="submit" value="Crear">
        {% comment %} <button>Crear</button> {% endcomment %}
    </form>
{% endblock contenido %}
